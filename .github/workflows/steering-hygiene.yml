name: Steering Hygiene

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run steering audit
        run: node scripts/steering-content-audit.js --fail-on-error --json --out .sce/reports/steering-hygiene/audit.json

      - name: Run clarification-first audit
        run: node scripts/clarification-first-audit.js --fail-on-violation --json --out .sce/reports/steering-hygiene/clarification-first-audit.json

      - name: Run release doc audit
        run: node scripts/release-doc-version-audit.js --fail-on-error --json --out .sce/reports/steering-hygiene/release-doc-version-audit.json

      - name: Upload steering audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: steering-hygiene-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            .sce/reports/steering-hygiene/audit.json
            .sce/reports/steering-hygiene/clarification-first-audit.json
            .sce/reports/steering-hygiene/release-doc-version-audit.json
